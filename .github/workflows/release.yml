name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish as a dry run"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  release-set:
    name: Resolve Release Inventory
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'naos-ui-v')
    runs-on: ubuntu-latest
    outputs:
      native_matrix: ${{ steps.inventory.outputs.native_matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false

      - name: Resolve native matrix
        id: inventory
        run: node scripts/release-set.mjs --github-output

  validate:
    name: Validate Release Set
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'naos-ui-v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check release set
        run: pnpm check-release-set

      - name: Check native types
        run: pnpm check-native-types

  native:
    name: Native Package (${{ matrix.package }})
    needs: [validate, release-set]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.release-set.outputs.native_matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Zig for musl
        if: contains(matrix.package, 'musl')
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild for musl
        if: contains(matrix.package, 'musl')
        run: cargo install cargo-zigbuild

      - name: Build native package
        run: pnpm --filter ${{ matrix.package }} build
        env:
          NAOS_CARGO_TARGET: ${{ matrix.rust_target }}
          NAOS_RUST_PROFILE: release

      - name: Smoke test native package
        run: node -e "const native = require('./${{ matrix.path }}'); console.log(native.getNativeInfo())"

      - name: Publish native package
        shell: bash
        run: |
          args=(--access public --provenance)
          should_dry_run=true
          if [[ "${{ github.event_name }}" == "release" || "${{ inputs.dry_run }}" == "false" ]]; then
            should_dry_run=false
          fi
          if [[ "$should_dry_run" == "true" ]]; then
            args+=(--dry-run)
          fi
          npm publish "${args[@]}"
        working-directory: ${{ matrix.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  js:
    name: JavaScript Packages
    needs: native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local native binding
        run: pnpm build:native

      - name: Verify
        run: pnpm check && pnpm test

      - name: Build packages
        run: pnpm build

      - name: Publish JavaScript packages
        shell: bash
        run: |
          args=(--access public --provenance)
          should_dry_run=true
          if [[ "${{ github.event_name }}" == "release" || "${{ inputs.dry_run }}" == "false" ]]; then
            should_dry_run=false
          fi
          if [[ "$should_dry_run" == "true" ]]; then
            args+=(--dry-run)
          fi
          while IFS= read -r package_path; do
            npm publish "$package_path" "${args[@]}"
          done < <(node scripts/release-set.mjs --js-paths)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
