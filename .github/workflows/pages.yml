name: Deploy docs and demos to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs and demo site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build native compiler
        run: pnpm build:native

      - name: Check TypeScript packages
        run: pnpm check-types

      - name: Check docs types
        run: pnpm check:docs

      - name: Check demo types
        run: pnpm --filter @iktia/example-counter type-check

      - name: Install Playwright Chromium
        run: pnpm --filter @iktia/example-counter exec playwright install --with-deps chromium

      - name: Prepare demo DSD
        run: pnpm --filter @iktia/example-counter prepare:dsd

      - name: Test demo
        run: pnpm --filter @iktia/example-counter exec playwright test --project=chromium

      - name: Build docs site
        run: pnpm build:docs
        env:
          IKTIA_GITHUB_PAGES: "true"

      - name: Build demo site
        run: pnpm --filter @iktia/example-counter build
        env:
          IKTIA_GITHUB_PAGES: "true"

      - name: Copy demo into docs artifact
        run: |
          mkdir -p sites/docs/build/client/demos
          cp -R examples/counter/dist/. sites/docs/build/client/demos/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: sites/docs/build/client

  deploy:
    name: Deploy docs and demo site
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
