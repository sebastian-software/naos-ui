name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Product Release PR
    runs-on: ubuntu-latest
    steps:
      - name: Release Please
        uses: googleapis/release-please-action@v5
        with:
          # PAT (org secret) so the release PR is authored by a real user and
          # its push events trigger CI. With the default GITHUB_TOKEN, runs are
          # parked as "action_required" and never execute.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
