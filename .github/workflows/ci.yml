name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency boundaries
        run: pnpm check-dependency-boundaries

      - name: Build local native binding
        run: pnpm build:native

      - name: Check release set
        run: pnpm check-release-set

      - name: Check native types
        run: pnpm check-native-types

      - name: Check TypeScript
        run: pnpm check-types

      - name: Check docs types
        run: pnpm check:docs

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Lint and format (JS/TS + Rust)
        run: pnpm lint

      - name: Test packages and Rust
        run: pnpm test

      - name: Check example types
        run: pnpm --filter @naos-ui/example-counter type-check

      - name: Build example
        run: pnpm --filter @naos-ui/example-counter build

      - name: Check tasks example types
        run: pnpm --filter @naos-ui/example-tasks type-check

      - name: Unit test tasks example
        run: pnpm --filter @naos-ui/example-tasks test:unit

      - name: Build tasks example
        run: pnpm --filter @naos-ui/example-tasks build

      - name: Build playground assets
        run: pnpm build:playground

      - name: Build docs
        run: pnpm build:docs

  fresh-project:
    name: Fresh Project (create-naos)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify scaffolded project
        run: pnpm verify:fresh-project

  native:
    name: Native Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Build local native binding
        run: pnpm build:native

      - name: Upload native binding artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-binding-${{ runner.os }}
          path: packages/compiler/native/naos-node.node
          retention-days: 14

      - name: Build packages
        run: pnpm build

      - name: Test packages
        run: pnpm test:packages

  browser:
    name: Browser Gate (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.18.0
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build local native binding
        run: pnpm build:native

      - name: Build packages
        run: pnpm build

      - name: Prepare demo DSD
        run: pnpm --filter @naos-ui/example-counter prepare:dsd

      - name: Install Playwright browser
        run: pnpm --filter @naos-ui/example-counter exec playwright install --with-deps ${{ matrix.browser }}

      - name: Run example browser tests
        run: pnpm --filter @naos-ui/example-counter exec playwright test --project=${{ matrix.browser }}

      - name: Run tasks example browser tests
        run: pnpm --filter @naos-ui/example-tasks exec playwright test --project=${{ matrix.browser }}
